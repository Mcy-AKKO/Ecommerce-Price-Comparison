{% extends "base.html" %}

{% block title %}注册 - 商品比价系统{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus fs-1 text-success"></i>
                        <h3 class="mt-3">创建账户</h3>
                        <p class="text-muted">加入我们，开始比价之旅</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-person"></i> 用户名
                            </label>
                            <input type="text" class="form-control form-control-lg" name="username" required
                                   placeholder="请输入用户名" pattern="^[a-zA-Z0-9_]{3,20}$"
                                   title="用户名只能包含字母、数字和下划线，长度3-20位">
                            <div class="form-text">3-20位，字母、数字或下划线</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope"></i> 邮箱
                            </label>
                            <input type="email" class="form-control form-control-lg" name="email" required
                                   placeholder="请输入邮箱">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-lock"></i> 密码
                            </label>
                            <input type="password" class="form-control form-control-lg" name="password" required
                                   placeholder="请输入密码" minlength="6">
                            <div class="form-text">密码长度至少6位</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-lock-fill"></i> 确认密码
                            </label>
                            <input type="password" class="form-control form-control-lg" name="confirm_password" required
                                   placeholder="请再次输入密码">
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-person-plus"></i> 注册
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted">已有账户？</p>
                        <a href="{{ url_for('login') }}" class="btn btn-outline-primary">
                            <i class="bi bi-box-arrow-in-right"></i> 立即登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.querySelector('input[name="password"]').value;
    const confirm = document.querySelector('input[name="confirm_password"]').value;

    if (password !== confirm) {
        e.preventDefault();
        alert('两次输入的密码不一致！');
    }
});
</script>
{% endblock %}
