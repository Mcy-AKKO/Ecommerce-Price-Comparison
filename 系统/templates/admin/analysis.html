{% extends "base.html" %}

{% block title %}数据分析 - 管理面板{% endblock %}

{% block extra_css %}
<style>
.analysis-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-item { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 20px; text-align: center; color: white; }
.stat-item-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
.stat-number { font-size: 2rem; font-weight: bold; }
.chart-container { height: 400px; width: 100%; margin-top: 20px; }
.insight-box { background: #f8f9fa; border-left: 4px solid #667eea; padding: 15px; margin-top: 20px; border-radius: 8px; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="analysis-card">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h5 class="mb-0"><i class="bi bi-graph-up"></i> 商品数据分析</h5>
            <div class="d-flex gap-2">
                <select id="keyword-select" class="form-select" style="width: 200px;">
                    <option value="">请选择关键词</option>
                    {% for kw in keywords %}
                        <option value="{{ kw }}">{{ kw }}</option>
                    {% endfor %}
                </select>
                <button id="analyze-btn" class="btn btn-primary"><i class="bi bi-bar-chart"></i> 分析</button>
            </div>
        </div>

        <div id="analysis-content" style="display: none;">
            <div class="stat-grid">
                <div class="stat-item"><div class="stat-number" id="total-count">-</div><div>商品总数</div></div>
                <div class="stat-item stat-item-info"><div class="stat-number" id="avg-price">-</div><div>平均价格</div></div>
                <div class="stat-item" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"><div class="stat-number" id="min-price">-</div><div>最低价格</div></div>
                <div class="stat-item" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"><div class="stat-number" id="max-price">-</div><div>最高价格</div></div>
            </div>

            <div class="row">
                <div class="col-lg-6">
                    <div class="analysis-card">
                        <h6><i class="bi bi-pie-chart"></i> 平台分布</h6>
                        <div id="platform-chart" class="chart-container" style="width:600px"></div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="analysis-card">
                        <h6><i class="bi bi-bar-chart"></i> 价格区间分布</h6>
                        <div id="price-distribution-chart" class="chart-container" style="width:600px"></div>
                    </div>
                </div>
            </div>

            <div class="analysis-card">
                <h6><i class="bi bi-line-chart"></i> 价格趋势（按日期）</h6>
                <div id="trend-chart" class="chart-container"></div>
            </div>

            <div class="analysis-card">
                <h6><i class="bi bi-trophy"></i> 最划算商品 Top 10</h6>
                <div id="best-products" class="mt-3"></div>
            </div>

            <div class="analysis-card">
                <h6><i class="bi bi-lightbulb"></i> 数据分析洞察</h6>
                <div id="insights" class="insight-box"></div>
            </div>
        </div>
    </div>
</div>

<script>
var platformChart = null;
var priceDistChart = null;
var trendChart = null;
var currentData = null;

$(document).ready(function() {
    $('#analyze-btn').click(function() {
        var keyword = $('#keyword-select').val();
        if (!keyword) {
            showToast('请选择关键词', 'warning');
            return;
        }

        var btn = $(this);
        btn.html('<span class="loading-spinner"></span> 分析中...').prop('disabled', true);
        $('#analysis-content').hide();

        $.ajax({
            url: '/user/api/analysis/data',
            data: { keyword: keyword },
            dataType: 'json',
            success: function(data) {
                console.log('分析数据:', data);
                currentData = data;

                // 计算总数
                var totalCount = 0;
                if (data.platform_stats) {
                    for (var i = 0; i < data.platform_stats.length; i++) {
                        totalCount += data.platform_stats[i].value;
                    }
                }
                $('#total-count').text(totalCount);
                $('#avg-price').text('¥' + (data.price_range.avg || 0).toFixed(2));
                $('#min-price').text('¥' + (data.price_range.min || 0).toFixed(2));
                $('#max-price').text('¥' + (data.price_range.max || 0).toFixed(2));

                renderPlatformChart(data.platform_stats);
                renderPriceDistributionChart(data.price_distribution);
                renderTrendChart(data.price_trend);
                renderBestProducts(data.best_products);
                renderInsights(data);

                $('#analysis-content').fadeIn();
                $('#export-btn').prop('disabled', false);
            },
            error: function(xhr, status, error) {
                console.error('分析失败:', error);
                showToast('分析失败，请重试', 'error');
            },
            complete: function() {
                btn.html('<i class="bi bi-bar-chart"></i> 分析').prop('disabled', false);
            }
        });
    });

    $('#export-btn').click(function() {
        if (!currentData) return;

        var keyword = $('#keyword-select').val();
        var exportData = {
            keyword: keyword,
            export_time: new Date().toLocaleString(),
            statistics: currentData.price_range,
            platform_distribution: currentData.platform_stats,
            price_distribution: currentData.price_distribution,
            price_trend: currentData.price_trend,
            best_products: currentData.best_products
        };

        var dataStr = JSON.stringify(exportData, null, 2);
        var blob = new Blob([dataStr], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = keyword + '_analysis_report_' + new Date().toISOString().slice(0, 19) + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('报告导出成功', 'success');
    });
});

function renderPlatformChart(data) {
    var chartDom = document.getElementById('platform-chart');
    if (!chartDom) return;
    if (platformChart) { platformChart.dispose(); platformChart = null; }

    var chartData = [];
    if (data && data.length > 0) {
        for (var i = 0; i < data.length; i++) {
            chartData.push({ name: data[i].name, value: data[i].value });
        }
    } else {
        chartData = [{ name: '暂无数据', value: 1 }];
    }

    platformChart = echarts.init(chartDom);
    platformChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { orient: 'vertical', left: 'left', top: 'center' },
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            data: chartData,
            label: { show: true, formatter: '{b}' },
            itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 }
        }]
    });
    window.addEventListener('resize', function() { if (platformChart) platformChart.resize(); });
}

function renderPriceDistributionChart(data) {
    var chartDom = document.getElementById('price-distribution-chart');
    if (!chartDom) return;
    if (priceDistChart) { priceDistChart.dispose(); priceDistChart = null; }

    if (!data || data.length === 0) {
        priceDistChart = echarts.init(chartDom);
        priceDistChart.setOption({
            title: { text: '暂无价格数据', left: 'center', top: 'center' }
        });
        return;
    }

    var categories = [];
    var counts = [];
    for (var i = 0; i < data.length; i++) {
        categories.push(data[i].range);
        counts.push(data[i].count);
    }

    priceDistChart = echarts.init(chartDom);
    priceDistChart.setOption({
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            formatter: function(params) {
                return params[0].name + '<br/>商品数量: ' + params[0].value;
            }
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: categories,
            axisLabel: {
                rotate: 30,
                interval: 0,
                fontSize: 11
            }
        },
        yAxis: {
            type: 'value',
            name: '商品数量',
            nameLocation: 'middle',
            nameGap: 35
        },
        series: [{
            type: 'bar',
            data: counts,
            itemStyle: {
                color: '#667eea',
                borderRadius: [4, 4, 0, 0],
                shadowColor: 'rgba(0,0,0,0.1)',
                shadowBlur: 4
            },
            label: {
                show: true,
                position: 'top',
                fontWeight: 'bold'
            },
            barWidth: '60%'
        }]
    });
    window.addEventListener('resize', function() { if (priceDistChart) priceDistChart.resize(); });
    setTimeout(function() { trendChart.resize(); }, 100);
}

function renderTrendChart(data) {
    var chartDom = document.getElementById('trend-chart');
    if (!chartDom) return;
    if (trendChart) { trendChart.dispose(); trendChart = null; }

    if (!data || data.length === 0) {
        trendChart = echarts.init(chartDom);
        trendChart.setOption({
            title: { text: '暂无趋势数据', left: 'center', top: 'center' }
        });
        return;
    }

    var dates = [], avgPrices = [], minPrices = [], maxPrices = [];
    for (var i = 0; i < data.length; i++) {
        dates.push(data[i].date);
        avgPrices.push(data[i].avg || 0);
        minPrices.push(data[i].min || 0);
        maxPrices.push(data[i].max || 0);
    }

    trendChart = echarts.init(chartDom);
    trendChart.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['平均价格', '最低价格', '最高价格'], top: 0 },
        grid: { top: 50, left: 60, right: 40, bottom: 40, containLabel: true },
        xAxis: {
            type: 'category',
            data: dates,
            axisLabel: { rotate: 45, interval: 0 }
        },
        yAxis: {
            type: 'value',
            name: '价格 (元)',
            nameLocation: 'middle',
            nameGap: 45
        },
        series: [
            {
                name: '平均价格',
                type: 'line',
                data: avgPrices,
                smooth: true,
                lineStyle: { width: 3, color: '#667eea' },
                areaStyle: { opacity: 0.1, color: '#667eea' },
                symbol: 'circle',
                symbolSize: 8,
                itemStyle: { color: '#667eea' }
            },
            {
                name: '最低价格',
                type: 'line',
                data: minPrices,
                lineStyle: { width: 2, color: '#10b981' },
                symbol: 'diamond',
                symbolSize: 6,
                itemStyle: { color: '#10b981' }
            },
            {
                name: '最高价格',
                type: 'line',
                data: maxPrices,
                lineStyle: { width: 2, color: '#ef4444' },
                symbol: 'triangle',
                symbolSize: 6,
                itemStyle: { color: '#ef4444' }
            }
        ]
    });
    window.addEventListener('resize', function() { if (trendChart) trendChart.resize(); });
    setTimeout(function() { trendChart.resize(); }, 100);
}

function renderBestProducts(products) {
    if (!products || products.length === 0) {
        $('#best-products').html('<p class="text-muted text-center py-4">暂无数据</p>');
        return;
    }

    var html = '<div class="table-responsive"><table class="table table-hover"><thead> <tr><th>排名</th><th>商品名称</th><th>平台</th><th>价格</th><th>操作</th></tr> </thead><tbody>';
    for (var i = 0; i < products.length; i++) {
        var p = products[i];
        var rankBadge = i < 3 ? '<span class="badge bg-warning">' + (i + 1) + '</span>' : '<span class="badge bg-secondary">' + (i + 1) + '</span>';
        html += '<tr>';
        html += '<td>' + rankBadge + '</td>';
        html += '<td>' + escapeHtml(p.title) + '</td>';
        html += '<td><span class="badge bg-info">' + escapeHtml(p.platform) + '</span></td>';
        html += '<td class="text-danger fw-bold">' + escapeHtml(p.price_raw || '¥' + p.price_value) + '</td>';
        html += '<td><a href="' + p.url + '" target="_blank" class="btn btn-sm btn-outline-primary">查看详情 <i class="bi bi-arrow-right"></i></a></td>';
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    $('#best-products').html(html);
}

function renderInsights(data) {
    var insights = [];

    // 平台分析
    if (data.platform_stats && data.platform_stats.length > 0) {
        var topPlatform = data.platform_stats[0];
        for (var i = 1; i < data.platform_stats.length; i++) {
            if (data.platform_stats[i].value > topPlatform.value) topPlatform = data.platform_stats[i];
        }
        var total = 0;
        for (var i = 0; i < data.platform_stats.length; i++) total += data.platform_stats[i].value;
        var percent = ((topPlatform.value / total) * 100).toFixed(1);
        insights.push('📊 商品主要集中在 <strong>' + topPlatform.name + '</strong> 平台，占比 ' + percent + '%');
    }

    // 价格分析
    insights.push('💰 价格区间 ¥' + data.price_range.min.toFixed(0) + ' - ¥' + data.price_range.max.toFixed(0) +
                  '，平均价格 ¥' + data.price_range.avg.toFixed(2));

    // 价格区间分析
    if (data.price_distribution && data.price_distribution.length > 0) {
        var maxCount = 0;
        var maxRange = '';
        for (var i = 0; i < data.price_distribution.length; i++) {
            if (data.price_distribution[i].count > maxCount) {
                maxCount = data.price_distribution[i].count;
                maxRange = data.price_distribution[i].range;
            }
        }
        if (maxCount > 0) {
            insights.push('📈 价格集中在 ' + maxRange + ' 区间，共有 ' + maxCount + ' 件商品');
        }
    }

    // 最划算商品
    if (data.best_products && data.best_products.length > 0) {
        insights.push('🏆 当前最划算商品：<strong>' + escapeHtml(data.best_products[0].title) + '</strong>，仅售 ' +
                      (data.best_products[0].price_raw || '¥' + data.best_products[0].price_value));

        if (data.best_products.length >= 2) {
            var diff = data.best_products[1].price_value - data.best_products[0].price_value;
            if (diff > 0) {
                insights.push('💡 第一名比第二名便宜 ¥' + diff.toFixed(2));
            }
        }
    }

    // 数据质量提示

    if (data.statistics && data.statistics.invalid_price_count > 0) {
        insights.push('⚠️ 有 ' + data.statistics.invalid_price_count + ' 件商品价格格式异常，已排除在价格分析之外');
    }

    $('#insights').html(insights.map(function(i) { return '<p class="mb-2"><i class="bi bi-info-circle-fill text-primary"></i> ' + i + '</p>'; }).join(''));
}
</script>
{% endblock %}
