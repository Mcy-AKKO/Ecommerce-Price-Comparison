{% extends "base.html" %}

{% block extra_css %}
<style>
    .user-table-container {
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 15px;
    }
    .user-avatar-sm {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="user-table-container">
        <div class="table-header">
            <h5 class="mb-0"><i class="bi bi-people"></i> 用户管理</h5>
            <div class="filter-group d-flex gap-2">
                <select id="role-filter" class="form-select form-select-sm" style="width: auto;">
                    <option value="">全部角色</option>
                    <option value="admin">管理员</option>
                    <option value="user">普通用户</option>
                </select>
                <select id="status-filter" class="form-select form-select-sm" style="width: auto;">
                    <option value="">全部状态</option>
                    <option value="active">正常</option>
                    <option value="disabled">禁用</option>
                </select>
                <button id="search-btn" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 搜索</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>用户</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>注册时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="users-tbody">
                <tr>
                    <td colspan="7" class="text-center text-muted">
                        <div class="loading-spinner"></div>
                        加载中...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="pagination-container" class="mt-3"></div>
    </div>
</div>

<!-- 编辑用户模态框 -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-user-id">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" id="edit-username" class="form-control" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">角色</label>
                    <select id="edit-role" class="form-select">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">状态</label>
                    <select id="edit-status" class="form-select">
                        <option value="active">正常</option>
                        <option value="disabled">禁用</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="save-user-btn">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    let currentRole = '';
    let currentStatus = '';

    $(document).ready(function() {
        loadUsers();

        $('#search-btn').click(function() {
            currentRole = $('#role-filter').val();
            currentStatus = $('#status-filter').val();
            currentPage = 1;
            loadUsers();
        });

        $('#save-user-btn').click(saveUser);
    });

    function loadUsers() {
        $.ajax({
            url: '/admin/api/users',
            data: { page: currentPage, per_page: 20, role: currentRole, status: currentStatus },
            success: function(data) {
                renderUsers(data.users);
                renderPagination(data);
            },
            error: function() {
                $('#users-tbody').html('<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>');
            }
        });
    }

    function renderUsers(users) {
        if (!users || users.length === 0) {
            $('#users-tbody').html('<tr><td colspan="7" class="text-center text-muted">暂无用户</td></tr>');
            return;
        }

        let html = '';
        users.forEach(user => {
            html += `
                <tr>
                    <td><div class="user-avatar-sm">${user.username.charAt(0).toUpperCase()}</div></td>
                    <td><strong>${escapeHtml(user.username)}</strong></td>
                    <td>${escapeHtml(user.email)}</td>
                    <td><span class="badge ${user.role === 'admin' ? 'bg-danger' : 'bg-info'}">${user.role === 'admin' ? '管理员' : '普通用户'}</span></td>
                    <td><span class="badge ${user.status === 'active' ? 'bg-success' : 'bg-secondary'}">${user.status === 'active' ? '正常' : '禁用'}</span></td>
                    <td>${user.created_at}</td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-outline-primary" onclick="editUser(${user.id}, '${escapeHtml(user.username)}', '${user.role}', '${user.status}')"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${user.id}, '${escapeHtml(user.username)}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        $('#users-tbody').html(html);
    }

    function renderPagination(data) {
        if (data.pages <= 1) {
            $('#pagination-container').empty();
            return;
        }

        let html = '<nav><ul class="pagination justify-content-center">';
        if (data.page > 1) {
            html += `<li class="page-item"><a class="page-link" href="#" data-page="${data.page - 1}">上一页</a></li>`;
        }
        for (let i = Math.max(1, data.page - 2); i <= Math.min(data.pages, data.page + 2); i++) {
            html += `<li class="page-item ${i === data.page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        if (data.page < data.pages) {
            html += `<li class="page-item"><a class="page-link" href="#" data-page="${data.page + 1}">下一页</a></li>`;
        }
        html += '</ul></nav>';
        $('#pagination-container').html(html);

        $('.page-link').click(function(e) {
            e.preventDefault();
            currentPage = parseInt($(this).data('page'));
            loadUsers();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function editUser(id, username, role, status) {
        $('#edit-user-id').val(id);
        $('#edit-username').val(username);
        $('#edit-role').val(role);
        $('#edit-status').val(status);
        new bootstrap.Modal(document.getElementById('editUserModal')).show();
    }

    function saveUser() {
        const id = $('#edit-user-id').val();
        const role = $('#edit-role').val();
        const status = $('#edit-status').val();

        $.ajax({
            url: `/admin/user/${id}`,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ role, status }),
            success: function() {
                bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                loadUsers();
                showToast('用户信息已更新', 'success');
            },
            error: function() {
                showToast('保存失败', 'error');
            }
        });
    }

    function deleteUser(id, username) {
        if (confirm(`确定要删除用户 "${username}" 吗？此操作不可恢复！`)) {
            $.ajax({
                url: `/admin/user/${id}`,
                type: 'DELETE',
                success: function() {
                    loadUsers();
                    showToast('用户已删除', 'success');
                },
                error: function(xhr) {
                    showToast(xhr.responseJSON?.error || '删除失败', 'error');
                }
            });
        }
    }
</script>
{% endblock %}
