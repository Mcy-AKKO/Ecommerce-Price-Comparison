{% extends "base.html" %}


{% block extra_css %}
<style>
    .request-table-container {
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 500;
    }
    .status-pending { background: #fef3c7; color: #d97706; }
    .status-approved { background: #dbeafe; color: #2563eb; }
    .status-completed { background: #d1fae5; color: #10b981; }
    .status-rejected { background: #fee2e2; color: #ef4444; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="request-table-container">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h5 class="mb-0"><i class="bi bi-clipboard-check"></i> 爬取请求管理</h5>
            <div class="d-flex gap-2">
                <select id="status-filter" class="form-select form-select-sm" style="width: 120px;">
                    <option value="">全部状态</option>
                    <option value="pending">待审核</option>
                    <option value="approved">已通过</option>
                    <option value="completed">已完成</option>
                    <option value="rejected">已拒绝</option>
                </select>
                <button id="search-btn" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 搜索</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>用户</th>
                    <th>关键词</th>
                    <th>状态</th>
                    <th>结果数量</th>
                    <th>请求时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="requests-tbody">
                <tr>
                    <td colspan="7" class="text-center text-muted">
                        <div class="loading-spinner"></div>
                        加载中...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="pagination-container" class="mt-3"></div>
    </div>
</div>

<!-- 处理请求模态框 -->
<div class="modal fade" id="processModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">处理爬取请求</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">请求详情</label>
                    <div class="alert alert-info">
                        <strong>用户：</strong> <span id="modal-username"></span><br>
                        <strong>关键词：</strong> <span id="modal-keyword"></span><br>
                        <strong>请求时间：</strong> <span id="modal-time"></span>
                    </div>
                </div>
                <div class="mb-3" id="reject-reason-group" style="display: none;">
                    <label class="form-label">拒绝原因</label>
                    <textarea id="reject-reason" class="form-control" rows="3"
                              placeholder="请输入拒绝原因..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="reject-btn" style="display: none;">拒绝</button>
                <button type="button" class="btn btn-success" id="approve-btn">批准并爬取</button>
                <button type="button" class="btn btn-warning" id="toggle-reject-btn">拒绝</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    let currentStatus = '';
    let currentRequestId = null;

    $(document).ready(function() {
        loadRequests();

        $('#search-btn').click(function() {
            currentStatus = $('#status-filter').val();
            currentPage = 1;
            loadRequests();
        });

        $('#approve-btn').click(function() {
            $('#reject-reason-group').hide();
            processRequest('approve');
        });

        $('#toggle-reject-btn').click(function() {
            $('#reject-reason-group').show();
            $('#approve-btn').hide();
            $('#reject-btn').show();
            $(this).hide();
        });

        $('#reject-btn').click(function() {
            processRequest('reject');
        });

        $('#processModal').on('hidden.bs.modal', function() {
            $('#reject-reason-group').hide();
            $('#approve-btn').show();
            $('#reject-btn').hide();
            $('#toggle-reject-btn').show();
            $('#reject-reason').val('');
        });
    });

    function loadRequests() {
        $.ajax({
            url: '/admin/api/requests',
            data: { page: currentPage, per_page: 20, status: currentStatus },
            success: function(data) {
                renderRequests(data.requests);
                renderPagination(data);
            },
            error: function() {
                $('#requests-tbody').html('<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>');
            }
        });
    }

    function renderRequests(requests) {
        if (!requests || requests.length === 0) {
            $('#requests-tbody').html('<td><td colspan="7" class="text-center text-muted">暂无请求</td></tr>');
            return;
        }

        let html = '';
        requests.forEach(r => {
            // 【新增】显示申请理由
            var reasonDisplay = r.remark ? `<br><small class="text-muted"><i class="bi bi-chat-left-text"></i> ${escapeHtml(r.remark)}</small>` : '';

            html += `
                 <tr>
                    <td>${r.id}</td>
                    <td><strong>${escapeHtml(r.username)}</strong></td>
                    <td>
                    <span class="badge bg-primary">${escapeHtml(r.keyword)}</span>
                    ${reasonDisplay}  <!-- 【新增】显示理由 -->
                    </td>
                    <td><span class="status-badge status-${r.status}">${getStatusText(r.status)}</span></td>
                    <td>${r.result_count || '-'}</td>
                    <td>${r.created_at}</td>
                    <td class="action-buttons">
                        ${r.status === 'pending' ?
                            `<button class="btn btn-sm btn-success" onclick="openProcessModal(${r.id}, '${escapeHtml(r.username)}', '${escapeHtml(r.keyword)}', '${r.created_at}')">
                                <i class="bi bi-check-lg"></i> 处理
                            </button>` :
                            `<button class="btn btn-sm btn-secondary" disabled><i class="bi bi-check2-circle"></i> 已处理</button>`
                        }
                    </td>
                </tr>
            `;
        });
        $('#requests-tbody').html(html);
    }

    function getStatusText(status) {
        const map = { pending: '待审核', approved: '已通过', completed: '已完成', rejected: '已拒绝' };
        return map[status] || status;
    }

    function renderPagination(data) {
        if (data.pages <= 1) {
            $('#pagination-container').empty();
            return;
        }

        let html = '<nav><ul class="pagination justify-content-center">';
        if (data.page > 1) {
            html += `<li class="page-item"><a class="page-link" href="#" data-page="${data.page - 1}">上一页</a></li>`;
        }
        for (let i = Math.max(1, data.page - 2); i <= Math.min(data.pages, data.page + 2); i++) {
            html += `<li class="page-item ${i === data.page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        if (data.page < data.pages) {
            html += `<li class="page-item"><a class="page-link" href="#" data-page="${data.page + 1}">下一页</a></li>`;
        }
        html += '</ul></nav>';
        $('#pagination-container').html(html);

        $('.page-link').click(function(e) {
            e.preventDefault();
            currentPage = parseInt($(this).data('page'));
            loadRequests();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function openProcessModal(id, username, keyword, time) {
        currentRequestId = id;
        $('#modal-username').text(username);
        $('#modal-keyword').text(keyword);
        $('#modal-time').text(time);
        new bootstrap.Modal(document.getElementById('processModal')).show();
    }

    function processRequest(action) {
        if (!currentRequestId) return;

        const data = { action };
        if (action === 'reject') {
            const reason = $('#reject-reason').val();
            if (!reason) {
                showToast('请输入拒绝原因', 'warning');
                return;
            }
            data.remark = reason;
        }

        const btn = action === 'approve' ? $('#approve-btn') : $('#reject-btn');
        const originalText = btn.html();
        btn.html('<span class="loading-spinner"></span> 处理中...').prop('disabled', true);

        $.ajax({
            url: `/admin/request/${currentRequestId}/process`,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(response) {
                bootstrap.Modal.getInstance(document.getElementById('processModal')).hide();
                loadRequests();
                showToast(response.message, 'success');
            },
            error: function(xhr) {
                showToast(xhr.responseJSON?.error || '处理失败', 'error');
            },
            complete: function() {
                btn.html(originalText).prop('disabled', false);
            }
        });
    }
</script>
{% endblock %}
