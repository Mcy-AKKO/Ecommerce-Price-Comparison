{% extends "base.html" %}


{% block extra_css %}
<link href="https://cdn.bootcdn.net/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>
<style>
    .product-card { transition: all 0.3s; border-radius: 16px; overflow: hidden; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .product-image { height: 200px; object-fit: cover; width: 100%; }
    .price-tag { font-size: 1.25rem; font-weight: bold; color: #ef4444; }
    .platform-badge { position: absolute; top: 10px; right: 10px; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; background: rgba(0,0,0,0.7); color: white; }
    .filter-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
    /* 给"请选择关键词"下拉框加背景 */
.select2-container--bootstrap-5 .select2-selection {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
    border: none !important;
    color: white !important;
    min-height: 38px;
    border-radius: 12px !important;     /* 四个角变圆 */
    text-align: center !important;       /* 文字居中 */
}

/* 下拉框里的文字颜色 */
.select2-container--bootstrap-5 .select2-selection__rendered {
    color: white !important;
    font-weight: 500;
}

/* 下拉箭头颜色 */
.select2-container--bootstrap-5 .select2-selection__arrow b {
    border-color: white transparent transparent transparent !important;
}

/* 下拉菜单打开时的选项 */
.select2-container--bootstrap-5 .select2-dropdown {
    border: 2px solid #667eea;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

/* 鼠标悬停时的选项背景 */
.select2-container--bootstrap-5 .select2-results__option--highlighted {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
    color: white !important;
}
    .card-title { font-size: 0.95rem; height: 48px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="filter-section">
        <h5 class="mb-3"><i class="bi bi-funnel"></i> 筛选商品</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">关键词</label>
                <select id="keyword-select" class="form-select">
                    <option value="">请选择关键词</option>
                    {% for kw in keywords %}
                    <option value="{{ kw }}">{{ kw }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">平台</label>
                <select id="platform-select" class="form-select" disabled>
                    <option value="">所有平台</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">排序方式</label>
                <select id="sort-select" class="form-select">
                    <option value="publish_date_desc">最新发布</option>
                    <option value="publish_date_asc">最早发布</option>
                    <option value="price_asc">价格从低到高</option>
                    <option value="price_desc">价格从高到低</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">&nbsp;</label>
                <button id="search-btn" class="btn btn-primary w-100"><i class="bi bi-search"></i> 搜索</button>
            </div>
        </div>
    </div>

    <div id="products-container">
        <div class="text-center py-5">
            <div class="loading-spinner"></div>
            <p class="mt-2 text-muted">请选择关键词查看商品</p></div>
    </div>
    <div id="pagination-container" class="mt-4"></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
<script>
    let currentPage = 1;
    let currentKeyword = '';
    let currentPlatform = '';
    let currentSort = 'publish_date_desc';

    $(document).ready(function() {
        $('#keyword-select').select2({ placeholder: '请选择关键词', allowClear: true, theme: 'bootstrap-5' });

        $('#keyword-select').change(function() {
            const keyword = $(this).val();
            if (keyword) {
                loadPlatforms(keyword);
            } else {
                $('#platform-select').prop('disabled', true).html('<option value="">所有平台</option>');
            }
        });

        $('#search-btn').click(function() {
            currentKeyword = $('#keyword-select').val();
            currentPlatform = $('#platform-select').val();
            currentSort = $('#sort-select').val();
            if (!currentKeyword) { showToast('请先选择关键词', 'warning'); return; }
            currentPage = 1;
            loadProducts();
        });
    });

    function loadPlatforms(keyword) {
        $.ajax({
            url: '/user/api/platforms',
            data: { keyword },
            success: function(platforms) {
                const select = $('#platform-select');
                select.empty().append('<option value="">所有平台</option>');
                platforms.forEach(p => select.append(`<option value="${p}">${p}</option>`));
                select.prop('disabled', false);
            }
        });
    }

    function loadProducts() {
        const [sortBy, sortOrder] = currentSort.split('_');
        $.ajax({
            url: '/user/api/products',
            data: { keyword: currentKeyword, platform: currentPlatform, sort_by: sortBy, sort_order: sortOrder, page: currentPage, per_page: 12 },
            success: function(data) {
                renderProducts(data.products);
                renderPagination(data);
            },
            error: function() { $('#products-container').html('<div class="alert alert-danger">加载失败，请重试</div>'); }
        });
    }

    function renderProducts(products) {
        if (!products || products.length === 0) {
            $('#products-container').html('<div class="text-center py-5"><i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-3 text-muted">暂无商品数据</p></div>');
            return;
        }
        let html = '<div class="row g-4">';
        products.forEach(p => {
            const platformColor = p.platform.includes('京东') ? 'danger' : (p.platform.includes('天猫') ? 'info' : (p.platform.includes('拼多多') ? 'success' : 'secondary'));
            html += `
                <div class="col-md-6 col-lg-4">
                    <div class="card product-card h-100">
                        ${p.image_url ? `<img src="${p.image_url}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">` :
                            `<div class="product-image bg-light d-flex align-items-center justify-content-center"><i class="bi bi-image fs-1 text-muted"></i></div>`}
                        <div class="card-body">
                            <span class="platform-badge bg-${platformColor}">${escapeHtml(p.platform)}</span>
                            <h6 class="card-title mt-3">${escapeHtml(p.title)}</h6>
                            <div class="price-tag mt-2">${escapeHtml(p.price_raw || '¥' + p.price_value)}</div>
                            <div class="text-muted small mt-2"><i class="bi bi-calendar"></i> ${p.publish_date}</div>
                        </div>
                        <div class="card-footer bg-white border-0 pb-3"><a href="${p.url}" target="_blank" class="btn btn-outline-primary w-100"><i class="bi bi-link-45deg"></i> 查看详情</a></div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        $('#products-container').html(html);
    }

    function renderPagination(data) {
        if (data.pages <= 1) { $('#pagination-container').empty(); return; }
        let html = '<nav><ul class="pagination justify-content-center">';
        if (data.page > 1) html += `<li class="page-item"><a class="page-link" href="#" data-page="${data.page - 1}">上一页</a></li>`;
        for (let i = Math.max(1, data.page - 2); i <= Math.min(data.pages, data.page + 2); i++) {
            html += `<li class="page-item ${i === data.page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        if (data.page < data.pages) html += `<li class="page-item"><a class="page-link" href="#" data-page="${data.page + 1}">下一页</a></li>`;
        html += '</ul></nav>';
        $('#pagination-container').html(html);
        $('.page-link').click(function(e) { e.preventDefault(); currentPage = parseInt($(this).data('page')); loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }
</script>
{% endblock %}
