{% extends "base.html" %}


{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4">
                    <h5 class="mb-0">
                        <i class="bi bi-person-gear"></i> 个人信息设置
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-person"></i> 用户名
                            </label>
                            <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                            <div class="form-text">用户名不可修改</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope"></i> 邮箱地址
                            </label>
                            <input type="email" class="form-control" name="email"
                                   value="{{ current_user.email }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-lock"></i> 新密码
                            </label>
                            <input type="password" class="form-control" name="password"
                                   placeholder="留空则不修改密码" minlength="6">
                            <div class="form-text">密码长度至少6位</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-calendar"></i> 注册时间
                            </label>
                            <input type="text" class="form-control"
                                   value="{{ current_user.created_at.strftime('%Y-%m-%d %H:%M') }}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-shield"></i> 账户状态
                            </label>
                            <div>
                                {% if current_user.status == 'active' %}
                                <span class="badge bg-success">正常</span>
                                {% else %}
                                <span class="badge bg-danger">禁用</span>
                                {% endif %}
                            </div>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('user_dashboard') }}" class="btn btn-secondary">
                                取消
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> 保存修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
